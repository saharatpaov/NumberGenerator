<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Test</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h1 { color: #e91e63; }
    .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h1>🧪 Simple Test</h1>
  <div id="status">กำลังทดสอบ...</div>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const statusDiv = document.getElementById('status');
      
      try {
        // Test 1: Check if we can create basic HTML
        statusDiv.innerHTML = '<div class="success">✅ HTML โหลดสำเร็จ</div>';
        
        // Test 2: Check if we can run JavaScript
        setTimeout(() => {
          statusDiv.innerHTML += '<div class="success">✅ JavaScript ทำงานได้</div>';
          
          // Test 3: Try to load app.js
          const script = document.createElement('script');
          script.src = 'app.js';
          script.onload = function() {
            statusDiv.innerHTML += '<div class="success">✅ app.js โหลดสำเร็จ</div>';
            
            // Test 4: Check if classes exist
            if (typeof PatternValidator !== 'undefined') {
              statusDiv.innerHTML += '<div class="success">✅ PatternValidator class พบแล้ว</div>';
            } else {
              statusDiv.innerHTML += '<div class="error">❌ PatternValidator class ไม่พบ</div>';
            }
            
            if (typeof PatternAnalyzer !== 'undefined') {
              statusDiv.innerHTML += '<div class="success">✅ PatternAnalyzer class พบแล้ว</div>';
            } else {
              statusDiv.innerHTML += '<div class="error">❌ PatternAnalyzer class ไม่พบ</div>';
            }
            
            if (typeof init !== 'undefined') {
              statusDiv.innerHTML += '<div class="success">✅ init function พบแล้ว</div>';
              
              // Test 5: Try to run init
              try {
                init();
                statusDiv.innerHTML += '<div class="success">✅ init() ทำงานสำเร็จ</div>';
              } catch (error) {
                statusDiv.innerHTML += '<div class="error">❌ init() error: ' + error.message + '</div>';
              }
            } else {
              statusDiv.innerHTML += '<div class="error">❌ init function ไม่พบ</div>';
            }
          };
          
          script.onerror = function() {
            statusDiv.innerHTML += '<div class="error">❌ app.js โหลดไม่สำเร็จ</div>';
          };
          
          document.head.appendChild(script);
        }, 100);
        
      } catch (error) {
        statusDiv.innerHTML = '<div class="error">❌ Error: ' + error.message + '</div>';
      }
    });
  </script>
</body>
</html>
