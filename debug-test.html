<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Test</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Lucky Number Analysis Popup -->
  <div id="lucky-overlay" class="lucky-overlay">
    <div class="lucky-popup">
      <div class="lucky-header">
        <h3>🔮 ผลรวมเลขมงคล</h3>
        <button id="close-lucky-btn" class="close-btn">&times;</button>
      </div>
      
      <div class="lucky-body">
        <div class="selected-number">
          <label>หมายเลขบัญชีที่เลือก:</label>
          <div id="selected-account-number" class="account-number-display">-</div>
        </div>
        
        <div class="lucky-analysis">
          <div class="sum-section">
            <h4>📊 ผลรวมตัวเลข</h4>
            <div class="sum-display">
              <span id="digit-sum" class="digit-sum">-</span>
              <span class="sum-label">ผลรวมรวม</span>
            </div>
            <div class="rating-display">
              <div id="rating-badge" class="rating-badge">-</div>
              <div id="rating-description" class="rating-description">-</div>
            </div>
          </div>
          
          <div class="personality-section">
            <h4>👤 บุคลิกภาพและความหมาย</h4>
            <div id="personality-section" class="personality-display">
              <div class="personality-item">
                <strong>บุคลิกภาพ:</strong> <span>-</span>
              </div>
              <div class="meaning-item">
                <strong>ความหมาย:</strong> <span>-</span>
              </div>
            </div>
          </div>
          
          <div class="info-grid">
            <div class="zodiac-section">
              <h4>♈ ราศีที่เข้ากัน</h4>
              <div id="compatible-zodiac" class="zodiac-display">
                <div class="zodiac-item">
                  <span class="zodiac-icon">-</span>
                  <span class="zodiac-name">-</span>
                </div>
              </div>
            </div>
            
            <div class="career-section">
              <h4>💼 อาชีพที่เหมาะสม</h4>
              <div id="suitable-careers" class="career-display">
                <div class="career-list">-</div>
              </div>
            </div>
          </div>
          
          <div class="lucky-info-section">
            <h4>🍀 ข้อมูลเพิ่มเติม</h4>
            <div id="lucky-info" class="lucky-info-display">
              <div class="lucky-item">
                <strong>� โชคดี:</strong> <span>-</span>
              </div>
              <div class="warning-item">
                <strong>⚠️ ข้อควรระวัง:</strong> <span>-</span>
              </div>
              <div class="color-item">
                <strong>🎨 สีมงคล:</strong> <span>-</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <div class="lucky-footer">
        <div class="button-row">
          <button id="copy-number-btn" class="btn btn-primary">📋 คัดลอกเลข</button>
          <button id="close-lucky-footer-btn" class="btn btn-secondary">ปิด</button>
        </div>
        <div class="attribution">
          <small>ระบบเลขศาสตร์โดย <strong>แมน การิน</strong> (Man Karin)</small>
        </div>
      </div>
    </div>
  </div>

  <div style="padding: 2rem;">
    <h1>Debug Test</h1>
    <button onclick="directTest()" style="padding: 1rem; background: #e91e63; color: white; border: none; border-radius: 8px;">
      Direct Test
    </button>
    <button onclick="systemTest()" style="padding: 1rem; background: #f44336; color: white; border: none; border-radius: 8px; margin-left: 1rem;">
      System Test
    </button>
    
    <div id="debug-log" style="margin-top: 1rem; padding: 1rem; background: #f5f5f5; border-radius: 8px; font-family: monospace; white-space: pre-wrap; max-height: 400px; overflow-y: auto;"></div>
  </div>

  <script src="lucky-number-system.js"></script>
  <script>
    const debugLog = document.getElementById('debug-log');
    
    function addLog(message) {
      const timestamp = new Date().toLocaleTimeString();
      debugLog.textContent += `[${timestamp}] ${message}\n`;
      debugLog.scrollTop = debugLog.scrollHeight;
      console.log(message);
    }
    
    // Override console methods
    const originalLog = console.log;
    const originalError = console.error;
    
    console.log = function(...args) {
      originalLog.apply(console, args);
      addLog('LOG: ' + args.join(' '));
    };
    
    console.error = function(...args) {
      originalError.apply(console, args);
      addLog('ERROR: ' + args.join(' '));
    };
    
    function directTest() {
      addLog('=== DIRECT TEST ===');
      const overlay = document.getElementById('lucky-overlay');
      if (overlay) {
        addLog('Overlay found, showing directly...');
        overlay.classList.add('show');
        overlay.style.display = 'flex';
        overlay.style.opacity = '1';
        overlay.style.visibility = 'visible';
        
        // Fill with test data
        document.getElementById('selected-account-number').textContent = '123-456-7890';
        document.getElementById('digit-sum').textContent = '7';
        document.getElementById('sum-calculation').textContent = '1+2+3+4+5+6+7+8+9+0 = 45 → 4+5 = 9';
        
        addLog('Popup should be visible now');
      } else {
        addLog('Overlay not found!');
      }
    }
    
    function systemTest() {
      addLog('=== SYSTEM TEST ===');
      if (window.luckyNumberUI) {
        addLog('Lucky number UI found, calling showLuckyPopup...');
        window.luckyNumberUI.showLuckyPopup('123-456-7890');
      } else {
        addLog('Lucky number UI not found!');
        addLog('Available globals: ' + Object.keys(window).filter(k => k.includes('lucky')).join(', '));
      }
    }
    
    // Check initialization
    document.addEventListener('DOMContentLoaded', () => {
      addLog('DOM loaded');
      
      setTimeout(() => {
        addLog('Checking after 1 second...');
        addLog('luckyNumberUI available: ' + !!window.luckyNumberUI);
        addLog('LuckyNumberUI class available: ' + (typeof LuckyNumberUI !== 'undefined'));
        addLog('LuckyNumberAnalyzer class available: ' + (typeof LuckyNumberAnalyzer !== 'undefined'));
      }, 1000);
    });
  </script>
</body>
</html>
