<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Thai Mobile Full Generation - Corrected</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .test-result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
    .pass { background-color: #d4edda; border-color: #c3e6cb; }
    .fail { background-color: #f8d7da; border-color: #f5c6cb; }
    .warning { background-color: #fff3cd; border-color: #ffeaa7; }
    .numbers { max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
    .progress { margin: 10px 0; }
    .progress-bar { width: 100%; height: 20px; background-color: #f0f0f0; border-radius: 10px; }
    .progress-fill { height: 100%; background-color: #28a745; border-radius: 10px; transition: width 0.3s; }
  </style>
</head>
<body>
  <h1>Test Thai Mobile Full Generation - Corrected</h1>
  <div id="results"></div>

  <script src="app.js"></script>
  <script>
    function runTests() {
      const results = document.getElementById('results');
      
      try {
        // Initialize classes
        const generator = new PatternGenerator();
        const analyzer = new PatternAnalyzer();
        
        // Test one Thai Mobile pattern first (06)
        const pattern = '06????????';
        
        const testDiv = document.createElement('div');
        testDiv.className = 'test-result warning';
        testDiv.innerHTML = `
          <h3>Testing Pattern: ${pattern}</h3>
          <p><strong>Status:</strong> Starting generation...</p>
          <div class="progress">
            <div class="progress-bar">
              <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
          </div>
          <p id="progress-text">Preparing...</p>
        `;
        results.appendChild(testDiv);
        
        // Start generation with progress tracking
        setTimeout(() => {
          try {
            console.log(`Testing pattern: ${pattern}`);
            
            // Check pattern type identification
            const patternType = analyzer.identifyPatternType(pattern);
            console.log(`Pattern type: ${patternType}`);
            
            // Generate numbers with progress tracking
            const startTime = Date.now();
            
            // Update progress text
            document.getElementById('progress-text').textContent = 'Generating 100,000,000 numbers...';
            
            const numbers = generator.generateThaiMobileNo(pattern);
            
            const endTime = Date.now();
            const duration = endTime - startTime;
            
            // Check results
            const expectedCount = 100000000; // 100M
            const isComplete = numbers.length === expectedCount;
            const isSorted = checkSorted(numbers.slice(0, 10000)); // Check first 10K for sorting
            const hasCorrectPrefix = numbers.slice(0, 1000).every(num => num.startsWith('06'));
            
            const allTestsPassed = isComplete && isSorted && hasCorrectPrefix;
            
            testDiv.className = 'test-result ' + (allTestsPassed ? 'pass' : 'fail');
            testDiv.innerHTML = `
              <h3>Pattern: ${pattern}</h3>
              <p><strong>Pattern Type:</strong> ${patternType}</p>
              <p><strong>Numbers Generated:</strong> ${numbers.length.toLocaleString()}</p>
              <p><strong>Expected:</strong> ${expectedCount.toLocaleString()}</p>
              <p><strong>Complete:</strong> ${isComplete ? 'YES' : 'NO'}</p>
              <p><strong>Sorted (first 10K checked):</strong> ${isSorted ? 'YES' : 'NO'}</p>
              <p><strong>Correct Prefix:</strong> ${hasCorrectPrefix ? 'YES' : 'NO'}</p>
              <p><strong>Generation Time:</strong> ${duration.toLocaleString()}ms (${(duration/1000).toFixed(1)}s)</p>
              <div class="numbers">
                <strong>First 10 numbers:</strong><br>
                ${numbers.slice(0, 10).join('<br>')}
                <br><br>
                <strong>Numbers around 50M mark:</strong><br>
                ${numbers.slice(49999995, 50000005).join('<br>')}
                <br><br>
                <strong>Last 10 numbers:</strong><br>
                ${numbers.slice(-10).join('<br>')}
              </div>
            `;
            
          } catch (error) {
            testDiv.className = 'test-result fail';
            testDiv.innerHTML = `
              <h3>Pattern: ${pattern}</h3>
              <p><strong>Status:</strong> ERROR</p>
              <p><strong>Error:</strong> ${error.message}</p>
              <p><strong>Stack:</strong> ${error.stack}</p>
            `;
          }
        }, 100);
        
      } catch (error) {
        results.innerHTML = `<div class="test-result fail"><h3>Test Setup Error</h3><p>${error.message}</p></div>`;
      }
    }
    
    function checkSorted(numbers) {
      for (let i = 1; i < numbers.length; i++) {
        const prev = parseInt(numbers[i-1].replace(/-/g, ''));
        const curr = parseInt(numbers[i].replace(/-/g, ''));
        if (prev > curr) {
          console.log(`Not sorted at index ${i}: ${numbers[i-1]} > ${numbers[i]}`);
          return false;
        }
      }
      return true;
    }
    
    // Run tests when page loads
    document.addEventListener('DOMContentLoaded', runTests);
  </script>
</body>
</html>
