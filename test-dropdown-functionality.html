<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Dropdown Functionality</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <div class="logo-container">
          <div class="ascend-logo">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Inner circle with gradient -->
              <circle cx="18" cy="18" r="18" fill="url(#gradient)"/>
              <!-- Diagonal line -->
              <path d="M12 24 L24 12" stroke="white" stroke-width="3" stroke-linecap="round"/>
              <!-- Arrow head -->
              <path d="M19 12 L24 12 L24 17" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
              
              <defs>
                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" style="stop-color:#e91e63;stop-opacity:1" />
                  <stop offset="50%" style="stop-color:#f44336;stop-opacity:1" />
                  <stop offset="100%" style="stop-color:#ff9800;stop-opacity:1" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="brand-name">ascend</div>
        </div>
        <h1>Pattern-Based Number Generator</h1>
        <p class="subtitle">ทดสอบการทำงานของ Dropdown</p>
      </div>
    </header>

    <main>
      <!-- Pattern Selection Area -->
      <section class="input-section">
        <h2>เลือก Pattern</h2>
        <div class="input-group">
          <label for="pattern-select">เลือก Pattern Type:</label>
          <select id="pattern-select" aria-describedby="pattern-help">
            <option value="">-- เลือก Pattern --</option>
            
            <!-- The Soloist Patterns -->
            <optgroup label="1. The Soloist">
              <option value="aaaaaaaaaa" data-type="The Soloist" data-qty="10">aaa-aaa-aaaa (10 combinations)</option>
              <option value="abbbbbbbbb" data-type="The Soloist" data-qty="900">abb-bbb-bbbb (900 combinations)</option>
            </optgroup>
            
            <!-- The Full Straight Patterns -->
            <optgroup label="3. The Full Straight">
              <option value="abcdefghij" data-type="The Full Straight" data-qty="2">abc-def-ghij (2 combinations)</option>
            </optgroup>
          </select>
          <small id="pattern-help">เลือก pattern จากรายการที่กำหนดไว้</small>
          <button id="add-pattern-btn" class="btn btn-primary">เพิ่ม Pattern</button>
        </div>
        <!-- Error messages will be displayed here -->
        <div id="error-message" class="error-message" role="alert" aria-live="assertive"></div>
      </section>

      <!-- Pattern List Section -->
      <section class="pattern-list-section">
        <h2>Patterns ที่เพิ่มแล้ว</h2>
        <div id="pattern-list" class="pattern-list">
          <p style="color: #666; text-align: center;">ยังไม่มี pattern ที่เพิ่ม</p>
        </div>
      </section>

      <!-- Results Area -->
      <section class="results-section">
        <div class="results-header">
          <h2>ผลลัพธ์</h2>
          <button id="export-btn" class="btn btn-secondary" style="display: none;">Export เป็น CSV</button>
        </div>
        <div id="results-display" class="results-display">
          <p style="color: #666; text-align: center;">ยังไม่มีผลลัพธ์</p>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2024 Ascend Pattern-Based Number Generator</p>
    </footer>
  </div>

  <!-- Debug Console -->
  <div style="position: fixed; bottom: 10px; right: 10px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; max-width: 300px; max-height: 200px; overflow-y: auto;" id="debug-console">
    <strong>Debug Console:</strong><br>
    <div id="debug-output"></div>
  </div>

  <script src="performance-monitor.js"></script>
  <script src="app.js"></script>
  
  <script>
    // Debug logging
    function debugLog(message) {
      const output = document.getElementById('debug-output');
      const timestamp = new Date().toLocaleTimeString();
      output.innerHTML += `[${timestamp}] ${message}<br>`;
      output.scrollTop = output.scrollHeight;
      console.log(`[DEBUG] ${message}`);
    }

    // Override console.log to show in debug console
    const originalLog = console.log;
    console.log = function(...args) {
      debugLog(args.join(' '));
      originalLog.apply(console, args);
    };

    // Override console.error to show in debug console
    const originalError = console.error;
    console.error = function(...args) {
      debugLog(`ERROR: ${args.join(' ')}`);
      originalError.apply(console, args);
    };

    // Test the functionality when page loads
    document.addEventListener('DOMContentLoaded', function() {
      debugLog('Page loaded, testing dropdown functionality...');
      
      // Check if elements exist
      const patternSelect = document.getElementById('pattern-select');
      const addBtn = document.getElementById('add-pattern-btn');
      const errorDiv = document.getElementById('error-message');
      
      debugLog(`Pattern select found: ${!!patternSelect}`);
      debugLog(`Add button found: ${!!addBtn}`);
      debugLog(`Error div found: ${!!errorDiv}`);
      
      // Check if app.js loaded properly
      debugLog(`State object exists: ${typeof state !== 'undefined'}`);
      debugLog(`UIController exists: ${typeof uiController !== 'undefined'}`);
      
      // Test button click
      if (addBtn) {
        addBtn.addEventListener('click', function() {
          debugLog('Add button clicked!');
          debugLog(`Selected value: "${patternSelect.value}"`);
        });
      }
      
      // Test dropdown change
      if (patternSelect) {
        patternSelect.addEventListener('change', function() {
          debugLog(`Dropdown changed to: "${this.value}"`);
        });
      }
    });
  </script>
</body>
</html>
