<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Reservation System</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button { padding: 10px 15px; margin: 5px; }
        input { padding: 8px; margin: 5px; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; }
    </style>
</head>
<body>
    <h1>🧪 Reservation System Test</h1>
    
    <div class="test-section">
        <h2>1. Database Connection Test</h2>
        <button onclick="testDatabaseConnection()">Test Database</button>
        <div id="db-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>2. API Endpoint Test</h2>
        <button onclick="testAPIEndpoint()">Test API</button>
        <div id="api-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Check Reservation Status</h2>
        <input type="text" id="check-numbers" placeholder="123-456-7890,098-765-4321" value="123-456-7890,098-765-4321">
        <button onclick="checkReservations()">Check Status</button>
        <div id="check-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>4. Create New Reservation</h2>
        <input type="text" id="new-account" placeholder="Account Number (XXX-XXX-XXXX)" value="999-888-7777">
        <input type="text" id="new-thai-id" placeholder="Thai ID (13 digits)" value="1234567890121">
        <button onclick="createReservation()">Create Reservation</button>
        <div id="create-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>5. Main Application Test</h2>
        <p>Open the main application: <a href="index.html" target="_blank">index.html</a></p>
        <p>Try generating numbers and clicking on them to test the reservation popup.</p>
    </div>

    <script>
        async function testDatabaseConnection() {
            const result = document.getElementById('db-result');
            result.innerHTML = '<div class="info">Testing database connection...</div>';
            
            try {
                const response = await fetch('simple-db-test.php');
                const text = await response.text();
                
                if (text.includes('Database setup complete!')) {
                    result.innerHTML = '<div class="success">✅ Database connection successful!</div>';
                } else {
                    result.innerHTML = '<div class="error">❌ Database connection failed</div><pre>' + text + '</pre>';
                }
            } catch (error) {
                result.innerHTML = '<div class="error">❌ Error: ' + error.message + '</div>';
            }
        }
        
        async function testAPIEndpoint() {
            const result = document.getElementById('api-result');
            result.innerHTML = '<div class="info">Testing API endpoint...</div>';
            
            try {
                const response = await fetch('api/reservations.php?numbers=123-456-7890');
                const data = await response.json();
                
                if (data.success) {
                    result.innerHTML = '<div class="success">✅ API endpoint working!</div><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } else {
                    result.innerHTML = '<div class="error">❌ API returned error: ' + data.error + '</div>';
                }
            } catch (error) {
                result.innerHTML = '<div class="error">❌ API Error: ' + error.message + '</div>';
            }
        }
        
        async function checkReservations() {
            const result = document.getElementById('check-result');
            const numbers = document.getElementById('check-numbers').value;
            
            result.innerHTML = '<div class="info">Checking reservation status...</div>';
            
            try {
                const response = await fetch(`api/reservations.php?numbers=${encodeURIComponent(numbers)}`);
                const data = await response.json();
                
                if (data.success) {
                    let html = '<div class="success">✅ Status check successful!</div>';
                    html += '<h4>Results:</h4>';
                    
                    Object.entries(data.reservations).forEach(([number, status]) => {
                        const statusText = status.reserved ? 
                            `🔴 RESERVED by ${status.thai_id} (${status.pattern_type})` : 
                            '🟢 AVAILABLE';
                        html += `<div><strong>${number}</strong>: ${statusText}</div>`;
                    });
                    
                    result.innerHTML = html;
                } else {
                    result.innerHTML = '<div class="error">❌ Check failed: ' + data.error + '</div>';
                }
            } catch (error) {
                result.innerHTML = '<div class="error">❌ Error: ' + error.message + '</div>';
            }
        }
        
        async function createReservation() {
            const result = document.getElementById('create-result');
            const accountNumber = document.getElementById('new-account').value;
            const thaiId = document.getElementById('new-thai-id').value;
            
            result.innerHTML = '<div class="info">Creating reservation...</div>';
            
            try {
                const response = await fetch('api/reservations.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        account_number: accountNumber,
                        thai_id: thaiId,
                        pattern_type: 'Test Pattern',
                        pattern: 'test'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    result.innerHTML = '<div class="success">✅ Reservation created successfully!</div><pre>' + JSON.stringify(data.reservation, null, 2) + '</pre>';
                } else {
                    result.innerHTML = '<div class="error">❌ Reservation failed: ' + data.error + '</div>';
                }
            } catch (error) {
                result.innerHTML = '<div class="error">❌ Error: ' + error.message + '</div>';
            }
        }
        
        // Auto-run tests on page load
        window.onload = function() {
            testDatabaseConnection();
            setTimeout(testAPIEndpoint, 1000);
        };
    </script>
</body>
</html>
