<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Reservation System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <div class="loading-title">กำลังประมวลผล<span class="loading-dots"></span></div>
      <div id="loading-message" class="loading-message">กำลังสร้างหมายเลขบัญชี</div>
      <div class="loading-progress">
        <div id="loading-progress-bar" class="loading-progress-bar"></div>
      </div>
      <div class="loading-stats">
        <span id="loading-pattern">Pattern: -</span>
        <span id="loading-count">0 / 0</span>
      </div>
    </div>
  </div>

  <!-- Reservation Popup -->
  <div id="reservation-overlay" class="reservation-overlay">
    <div class="reservation-popup">
      <div class="reservation-header">
        <h3>จองหมายเลขบัญชี</h3>
        <button id="close-reservation-btn" class="close-btn">&times;</button>
      </div>
      
      <div class="reservation-body">
        <div class="selected-number">
          <label>หมายเลขบัญชีที่เลือก:</label>
          <div id="selected-account-number" class="account-number-display">-</div>
        </div>
        
        <div class="form-group">
          <label for="thai-id-input">เลขบัตรประชาชน (13 หลัก):</label>
          <input type="text" id="thai-id-input" class="thai-id-input" 
                 placeholder="1234567890123" maxlength="13" 
                 pattern="[0-9]{13}" autocomplete="off">
          <small class="input-help">กรุณาใส่เลขบัตรประชาชน 13 หลัก</small>
        </div>
        
        <div id="reservation-error" class="error-message"></div>
      </div>
      
      <div class="reservation-footer">
        <button id="cancel-reservation-btn" class="btn btn-secondary">ยกเลิก</button>
        <button id="confirm-reservation-btn" class="btn btn-primary">ยืนยันการจอง</button>
      </div>
    </div>
  </div>

  <div class="container">
    <header>
      <div class="header-content">
        <h1>Test Reservation System</h1>
      </div>
    </header>

    <main>
      <section class="input-section">
        <h2>ทดสอบระบบจองเลข</h2>
        <div class="input-group">
          <button id="test-popup-btn" class="btn btn-primary">ทดสอบ Popup</button>
          <button id="test-validation-btn" class="btn btn-secondary">ทดสอบ Thai ID Validation</button>
          <button id="generate-sample-btn" class="btn btn-secondary">สร้างตัวอย่างเลข</button>
        </div>
      </section>

      <section class="results-section">
        <h2>ตัวอย่างหมายเลขบัญชี</h2>
        <div id="sample-numbers" class="numbers-grid">
          <!-- Sample numbers will be generated here -->
        </div>
      </section>
    </main>
  </div>

  <script src="performance-monitor.js"></script>
  <script src="app.js"></script>
  <script>
    // Initialize the application when DOM is loaded
    document.addEventListener('DOMContentLoaded', function() {
      init();
      
      // Test buttons
      document.getElementById('test-popup-btn').addEventListener('click', function() {
        console.log('Testing reservation popup...');
        uiController.showReservationPopup('123-456-7890', 'Test Pattern', 'test-pattern');
      });
      
      document.getElementById('test-validation-btn').addEventListener('click', function() {
        console.log('Testing Thai ID validation...');
        
        const testIds = [
          '1234567890123', // Invalid checksum but correct format
          '123456789012',  // Too short
          '12345678901234', // Too long
          'abcdefghijklm',  // Non-numeric
          '1100800000018'   // Valid format (example)
        ];
        
        testIds.forEach(id => {
          const isValid = uiController.validateThaiId(id);
          console.log(`Thai ID ${id}: ${isValid ? 'VALID' : 'INVALID'}`);
        });
      });
      
      document.getElementById('generate-sample-btn').addEventListener('click', function() {
        console.log('Generating sample numbers...');
        
        const sampleNumbers = [
          '123-456-7890',
          '098-765-4321',
          '555-123-4567',
          '777-888-9999',
          '111-222-3333',
          '060-123-4567',
          '080-987-6543',
          '090-555-1234'
        ];
        
        const container = document.getElementById('sample-numbers');
        container.innerHTML = '';
        
        sampleNumbers.forEach(number => {
          const element = document.createElement('span');
          element.className = 'number-item clickable checking';
          element.setAttribute('data-number', number);
          element.textContent = number;
          element.title = 'คลิกเพื่อจองหมายเลขนี้';
          element.onclick = () => uiController.handleAccountNumberClick(number, element);
          container.appendChild(element);
        });
        
        // Simulate checking reservation status
        setTimeout(() => {
          // Mark some as reserved (red)
          const reservedNumbers = ['123-456-7890', '555-123-4567'];
          reservedNumbers.forEach(number => {
            uiController.updateNumberReservationStatus(number, true);
          });
          
          // Mark others as available (green)
          sampleNumbers.filter(n => !reservedNumbers.includes(n)).forEach(number => {
            uiController.updateNumberReservationStatus(number, false);
          });
        }, 1000);
      });
      
      // Auto-generate sample numbers on load
      setTimeout(() => {
        document.getElementById('generate-sample-btn').click();
      }, 500);
    });
  </script>
</body>
</html>
