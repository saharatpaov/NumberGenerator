<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Updated Rhythmic Bridge Patterns</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .test-section {
      margin: 20px 0;
      padding: 15px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background-color: #f9f9f9;
    }
    .test-result {
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
    }
    .success { background-color: #d4edda; border: 1px solid #c3e6cb; }
    .error { background-color: #f8d7da; border: 1px solid #f5c6cb; }
    .info { background-color: #d1ecf1; border: 1px solid #bee5eb; }
    .numbers { font-size: 12px; max-height: 150px; overflow-y: auto; }
    .comparison-table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
    }
    .comparison-table th, .comparison-table td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    .comparison-table th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <h1>Test Updated Rhythmic Bridge Patterns</h1>
        <p>เปรียบเทียบ patterns เก่าและใหม่ในกลุ่ม The Rhythmic Bridge</p>
      </div>
    </header>

    <main>
      <!-- Comparison Test -->
      <div class="test-section">
        <h2>🔄 Pattern Comparison Test</h2>
        <p>เปรียบเทียบ patterns เก่า (ตัวอักษร) กับ patterns ใหม่ (wildcard)</p>
        <button id="run-comparison-btn" class="btn btn-primary">Run Comparison</button>
        <div id="comparison-results"></div>
      </div>

      <!-- Individual Pattern Tests -->
      <div class="test-section">
        <h2>🧪 Individual Pattern Tests</h2>
        <button id="test-all-patterns-btn" class="btn btn-primary">Test All New Patterns</button>
        <div id="individual-results"></div>
      </div>

      <!-- Manual Test Area -->
      <div class="test-section">
        <h2>🎯 Manual Test Area</h2>
        <p>ทดสอบ patterns ใหม่ด้วยตนเอง</p>
        
        <div class="input-group">
          <label for="pattern-select">เลือก Pattern:</label>
          <select id="pattern-select">
            <option value="">-- เลือก Pattern --</option>
            <optgroup label="Old Patterns (Letters)">
              <option value="abcefgabcd" data-type="The Rhythmic Bridge">abc-efg-abcd (Old)</option>
              <option value="abcabcdefg" data-type="The Rhythmic Bridge">abc-abc-defg (Old)</option>
              <option value="efgabcabcd" data-type="The Rhythmic Bridge">efg-abc-abcd (Old)</option>
            </optgroup>
            <optgroup label="New Patterns (Wildcards)">
              <option value="abc???abc?" data-type="The Rhythmic Bridge">abc-???-abc? (New)</option>
              <option value="abcabc????" data-type="The Rhythmic Bridge">abc-abc-???? (New)</option>
              <option value="???abcabc?" data-type="The Rhythmic Bridge">???-abc-abc? (New)</option>
              <option value="abcabcabc?" data-type="The Rhythmic Bridge">abc-abc-abc? (New)</option>
            </optgroup>
          </select>
          <button id="add-pattern-btn" class="btn btn-primary">เพิ่ม Pattern</button>
        </div>
        
        <div id="error-message" class="error-message" role="alert" aria-live="assertive"></div>
        
        <div id="pattern-list" class="pattern-list"></div>
        
        <div id="results-display" class="results-display"></div>
      </div>
    </main>
  </div>

  <script src="performance-monitor.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize the application
      init();
      
      const runComparisonBtn = document.getElementById('run-comparison-btn');
      const comparisonResults = document.getElementById('comparison-results');
      const testAllPatternsBtn = document.getElementById('test-all-patterns-btn');
      const individualResults = document.getElementById('individual-results');
      
      // Pattern pairs for comparison
      const patternPairs = [
        { old: 'abcefgabcd', new: 'abc???abc?', name: 'Repeating pattern 2-3 block' },
        { old: 'abcabcdefg', new: 'abcabc????', name: 'Repeating pattern front-middle' },
        { old: 'efgabcabcd', new: '???abcabc?', name: 'Repeating pattern middle-end' },
        { old: 'abcabcabcd', new: 'abcabcabc?', name: 'Fully linked on 3 blocks' }
      ];
      
      // Comparison Test
      runComparisonBtn.addEventListener('click', function() {
        comparisonResults.innerHTML = '<p>Running comparison test...</p>';
        
        try {
          const analyzer = new PatternAnalyzer();
          const generator = new PatternGenerator();
          
          let html = '<div class="test-result info">';
          html += '<h4>Pattern Comparison Results</h4>';
          html += '<table class="comparison-table">';
          html += '<tr><th>Pattern Type</th><th>Old Pattern</th><th>Old Count</th><th>New Pattern</th><th>New Count</th><th>Status</th></tr>';
          
          let allPassed = true;
          
          patternPairs.forEach(pair => {
            try {
              // Test old pattern
              const oldType = analyzer.identifyPatternType(pair.old);
              const oldResults = generator.generate(pair.old, oldType);
              
              // Test new pattern
              const newType = analyzer.identifyPatternType(pair.new);
              const newResults = generator.generate(pair.new, newType);
              
              const passed = oldResults.length > 0 && newResults.length > 0 && 
                           oldType === 'The Rhythmic Bridge' && newType === 'The Rhythmic Bridge';
              
              if (!passed) allPassed = false;
              
              html += '<tr>';
              html += `<td>${pair.name}</td>`;
              html += `<td>${pair.old}</td>`;
              html += `<td>${oldResults.length}</td>`;
              html += `<td>${pair.new}</td>`;
              html += `<td>${newResults.length}</td>`;
              html += `<td>${passed ? '✅ PASS' : '❌ FAIL'}</td>`;
              html += '</tr>';
              
            } catch (error) {
              allPassed = false;
              html += '<tr>';
              html += `<td>${pair.name}</td>`;
              html += `<td colspan="5">❌ Error: ${error.message}</td>`;
              html += '</tr>';
            }
          });
          
          html += '</table>';
          html += `<p><strong>Overall Result: ${allPassed ? '✅ ALL TESTS PASSED' : '❌ SOME TESTS FAILED'}</strong></p>`;
          html += '</div>';
          
          comparisonResults.innerHTML = html;
          
        } catch (error) {
          comparisonResults.innerHTML = `<div class="test-result error">❌ Error: ${error.message}</div>`;
        }
      });
      
      // Individual Pattern Tests
      testAllPatternsBtn.addEventListener('click', function() {
        individualResults.innerHTML = '<p>Testing all new patterns...</p>';
        
        try {
          const analyzer = new PatternAnalyzer();
          const generator = new PatternGenerator();
          const newPatterns = ['abc???abc?', 'abcabc????', '???abcabc?', 'abcabcabc?'];
          
          let html = '';
          let allPassed = true;
          
          newPatterns.forEach(pattern => {
            try {
              const patternType = analyzer.identifyPatternType(pattern);
              const results = generator.generate(pattern, patternType);
              
              const passed = results.length > 0 && patternType === 'The Rhythmic Bridge';
              if (!passed) allPassed = false;
              
              html += '<div class="test-result ' + (passed ? 'success' : 'error') + '">';
              html += `<h4>Pattern: ${pattern}</h4>`;
              html += `<p><strong>Classified as:</strong> ${patternType}</p>`;
              html += `<p><strong>Generated numbers:</strong> ${results.length}</p>`;
              html += `<p><strong>Status:</strong> ${passed ? '✅ PASS' : '❌ FAIL'}</p>`;
              html += '</div>';
              
              if (results.length > 0) {
                html += '<div class="test-result info">';
                html += '<h4>Sample Numbers (first 5)</h4>';
                html += '<div class="numbers">' + results.slice(0, 5).join('<br>') + '</div>';
                html += '</div>';
              }
              
            } catch (error) {
              allPassed = false;
              html += `<div class="test-result error">❌ Pattern ${pattern} Error: ${error.message}</div>`;
            }
          });
          
          html = `<div class="test-result ${allPassed ? 'success' : 'error'}">
                    <h4>Overall Result: ${allPassed ? '✅ ALL PATTERNS WORKING' : '❌ SOME PATTERNS FAILED'}</h4>
                  </div>` + html;
          
          individualResults.innerHTML = html;
          
        } catch (error) {
          individualResults.innerHTML = `<div class="test-result error">❌ Error: ${error.message}</div>`;
        }
      });
      
      // Manual test area
      const patternSelect = document.getElementById('pattern-select');
      const addPatternBtn = document.getElementById('add-pattern-btn');
      
      addPatternBtn.addEventListener('click', function() {
        const selectedPattern = patternSelect.value;
        if (selectedPattern) {
          try {
            state.patternManager.addPattern(selectedPattern);
            uiController.updateUI();
            patternSelect.value = '';
            document.getElementById('error-message').textContent = '';
          } catch (error) {
            document.getElementById('error-message').textContent = error.message;
          }
        }
      });
    });
  </script>
</body>
</html>
