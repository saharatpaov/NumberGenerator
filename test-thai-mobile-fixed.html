<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Thai Mobile Fixed Implementation</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .test-result { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
    .pass { background-color: #d4edda; border-color: #c3e6cb; }
    .fail { background-color: #f8d7da; border-color: #f5c6cb; }
    .numbers { max-height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Test Thai Mobile Fixed Implementation</h1>
  <div id="results"></div>

  <script src="app.js"></script>
  <script>
    function runTests() {
      const results = document.getElementById('results');
      
      try {
        // Initialize classes
        const generator = new PatternGenerator();
        const analyzer = new PatternAnalyzer();
        
        // Test Thai Mobile patterns
        const patterns = ['06????????', '08????????', '09????????'];
        
        patterns.forEach(pattern => {
          const testDiv = document.createElement('div');
          testDiv.className = 'test-result';
          
          try {
            console.log(`Testing pattern: ${pattern}`);
            
            // Check pattern type identification
            const patternType = analyzer.identifyPatternType(pattern);
            console.log(`Pattern type: ${patternType}`);
            
            // Generate numbers
            const startTime = Date.now();
            const numbers = generator.generateThaiMobileNo(pattern);
            const endTime = Date.now();
            const duration = endTime - startTime;
            
            // Check if results are complete and sorted
            const expectedCount = 100000; // 100K samples
            const isComplete = numbers.length === expectedCount;
            const isSorted = checkSorted(numbers);
            const hasCorrectPrefix = numbers.every(num => num.startsWith(pattern.slice(0, 2)));
            
            // Check distribution (should be evenly spaced)
            const isEvenlyDistributed = checkEvenDistribution(numbers, pattern.slice(0, 2));
            
            const allTestsPassed = isComplete && isSorted && hasCorrectPrefix && isEvenlyDistributed;
            
            testDiv.className += allTestsPassed ? ' pass' : ' fail';
            testDiv.innerHTML = `
              <h3>Pattern: ${pattern}</h3>
              <p><strong>Pattern Type:</strong> ${patternType}</p>
              <p><strong>Numbers Generated:</strong> ${numbers.length.toLocaleString()}</p>
              <p><strong>Expected:</strong> ${expectedCount.toLocaleString()}</p>
              <p><strong>Complete:</strong> ${isComplete ? 'YES' : 'NO'}</p>
              <p><strong>Sorted:</strong> ${isSorted ? 'YES' : 'NO'}</p>
              <p><strong>Correct Prefix:</strong> ${hasCorrectPrefix ? 'YES' : 'NO'}</p>
              <p><strong>Evenly Distributed:</strong> ${isEvenlyDistributed ? 'YES' : 'NO'}</p>
              <p><strong>Generation Time:</strong> ${duration}ms</p>
              <div class="numbers">
                <strong>First 10 numbers:</strong><br>
                ${numbers.slice(0, 10).join('<br>')}
                <br><br>
                <strong>Middle 10 numbers (around 50K):</strong><br>
                ${numbers.slice(49995, 50005).join('<br>')}
                <br><br>
                <strong>Last 10 numbers:</strong><br>
                ${numbers.slice(-10).join('<br>')}
              </div>
            `;
            
          } catch (error) {
            testDiv.className += ' fail';
            testDiv.innerHTML = `
              <h3>Pattern: ${pattern}</h3>
              <p><strong>Status:</strong> ERROR</p>
              <p><strong>Error:</strong> ${error.message}</p>
            `;
          }
          
          results.appendChild(testDiv);
        });
        
      } catch (error) {
        results.innerHTML = `<div class="test-result fail"><h3>Test Setup Error</h3><p>${error.message}</p></div>`;
      }
    }
    
    function checkSorted(numbers) {
      for (let i = 1; i < numbers.length; i++) {
        const prev = parseInt(numbers[i-1].replace(/-/g, ''));
        const curr = parseInt(numbers[i].replace(/-/g, ''));
        if (prev > curr) {
          console.log(`Not sorted at index ${i}: ${numbers[i-1]} > ${numbers[i]}`);
          return false;
        }
      }
      return true;
    }
    
    function checkEvenDistribution(numbers, prefix) {
      // Check if numbers are evenly distributed (every 1000th number from 0 to 99,999,999)
      const expectedStep = 1000;
      
      for (let i = 0; i < Math.min(10, numbers.length); i++) {
        const number = numbers[i];
        const suffix = number.replace(/-/g, '').slice(2); // Remove prefix and dashes
        const expectedSuffix = (i * expectedStep).toString().padStart(8, '0');
        
        if (suffix !== expectedSuffix) {
          console.log(`Distribution check failed at index ${i}: expected ${prefix}${expectedSuffix}, got ${number}`);
          return false;
        }
      }
      
      return true;
    }
    
    // Run tests when page loads
    document.addEventListener('DOMContentLoaded', runTests);
  </script>
</body>
</html>
