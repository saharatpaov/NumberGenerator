<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test - Account Number Generator</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 20px; 
      background: linear-gradient(135deg, #e91e63, #f44336, #ff9800);
      min-height: 100vh;
    }
    .container { 
      background: white; 
      padding: 20px; 
      border-radius: 10px; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    select { 
      width: 100%; 
      padding: 10px; 
      margin: 10px 0; 
      border: 2px solid #e91e63;
      border-radius: 5px;
    }
    button { 
      background: linear-gradient(135deg, #e91e63, #f44336);
      color: white;
      border: none;
      padding: 10px 20px; 
      margin: 10px 0; 
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: linear-gradient(135deg, #f44336, #ff9800);
    }
    .results { 
      margin-top: 20px; 
      padding: 15px; 
      background: #f5f5f5; 
      border-radius: 5px;
    }
    .success { color: #4caf50; font-weight: bold; }
    .error { color: #f44336; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🇹🇭 Account Number Generator - Test</h1>
    
    <div>
      <label for="pattern-select">เลือก Pattern Type:</label>
      <select id="pattern-select">
        <option value="">-- เลือก Pattern --</option>
        
        <!-- The Soloist Patterns -->
        <optgroup label="1. The Soloist">
          <option value="aaaaaaaaaa" data-type="The Soloist">aaa-aaa-aaaa (All 10 digits identical)</option>
          <option value="?bbbbbbbbb" data-type="The Soloist">?bb-bbb-bbbb (All 9 digits identical)</option>
        </optgroup>
        
        <!-- Thai Mobile No. Patterns -->
        <optgroup label="6. Thai Mobile No.">
          <option value="06????????" data-type="Thai Mobile No.">06?-???-???? (Started with 06)</option>
          <option value="08????????" data-type="Thai Mobile No.">08?-???-???? (Started with 08)</option>
          <option value="09????????" data-type="Thai Mobile No.">09?-???-???? (Started with 09)</option>
        </optgroup>
      </select>
      
      <button onclick="testPattern()">ทดสอบ Pattern</button>
    </div>

    <div id="results" class="results" style="display: none;"></div>
  </div>

  <script src="app.js"></script>
  <script>
    function testPattern() {
      const select = document.getElementById('pattern-select');
      const resultsDiv = document.getElementById('results');
      const pattern = select.value;
      
      if (!pattern) {
        resultsDiv.innerHTML = '<div class="error">กรุณาเลือก pattern ก่อน!</div>';
        resultsDiv.style.display = 'block';
        return;
      }
      
      try {
        // Test validation
        const validator = new PatternValidator();
        const validationResult = validator.validate(pattern);
        
        if (!validationResult.isValid) {
          resultsDiv.innerHTML = '<div class="error">Validation Error: ' + validationResult.errorMessage + '</div>';
          resultsDiv.style.display = 'block';
          return;
        }
        
        // Test classification
        const analyzer = new PatternAnalyzer();
        const patternType = analyzer.identifyPatternType(pattern);
        
        // Test generation
        const generator = new PatternGenerator();
        const numbers = generator.generate(pattern, patternType);
        
        // Show results
        let html = '<div class="success">✅ ทดสอบสำเร็จ!</div>';
        html += '<p><strong>Pattern:</strong> ' + pattern + '</p>';
        html += '<p><strong>Type:</strong> ' + patternType + '</p>';
        html += '<p><strong>Generated Numbers:</strong> ' + numbers.length + ' numbers</p>';
        
        if (numbers.length > 0) {
          html += '<p><strong>Sample Numbers:</strong></p><ul>';
          for (let i = 0; i < Math.min(5, numbers.length); i++) {
            html += '<li>' + numbers[i] + '</li>';
          }
          if (numbers.length > 5) {
            html += '<li>... และอีก ' + (numbers.length - 5) + ' เลข</li>';
          }
          html += '</ul>';
        }
        
        resultsDiv.innerHTML = html;
        resultsDiv.style.display = 'block';
        
      } catch (error) {
        resultsDiv.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
        resultsDiv.style.display = 'block';
      }
    }
    
    // Test on page load
    window.addEventListener('load', function() {
      const select = document.getElementById('pattern-select');
      const thaiMobileOptgroup = select.querySelector('optgroup[label*="Thai Mobile"]');
      
      if (thaiMobileOptgroup) {
        console.log('✅ Thai Mobile patterns found!');
      } else {
        console.error('❌ Thai Mobile patterns NOT found!');
      }
    });
  </script>
</body>
</html>
