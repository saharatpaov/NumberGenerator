<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Full Application with Thai Mobile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <h1>Account Number Generator - Test</h1>
      </div>
    </header>

    <main>
      <!-- Pattern Selection Area -->
      <section class="input-section">
        <h2>เลือก Pattern</h2>
        <div class="input-group">
          <label for="pattern-select">เลือก Pattern Type:</label>
          <select id="pattern-select" aria-describedby="pattern-help">
            <option value="">-- เลือก Pattern --</option>
            
            <!-- Thai Mobile No. Patterns -->
            <optgroup label="6. Thai Mobile No.">
              <option value="06????????" data-type="Thai Mobile No.">06?-???-???? (Started with 06)</option>
              <option value="08????????" data-type="Thai Mobile No.">08?-???-???? (Started with 08)</option>
              <option value="09????????" data-type="Thai Mobile No.">09?-???-???? (Started with 09)</option>
            </optgroup>
          </select>
          <small id="pattern-help">เลือก pattern จากรายการที่กำหนดไว้</small>
          <button id="add-pattern-btn" class="btn btn-primary">เพิ่ม Pattern</button>
        </div>
        <!-- Error messages will be displayed here -->
        <div id="error-message" class="error-message" role="alert" aria-live="assertive"></div>
      </section>

      <!-- Pattern List Section -->
      <section class="pattern-list-section">
        <h2>Patterns ที่เพิ่มแล้ว</h2>
        <div id="pattern-list" class="pattern-list"></div>
      </section>

      <!-- Results Area -->
      <section class="results-section">
        <div class="results-header">
          <h2>ผลลัพธ์</h2>
          <button id="export-btn" class="btn btn-secondary" style="display: none;">Export เป็น CSV</button>
        </div>
        <div id="results-display" class="results-display"></div>
        
        <!-- Performance Metrics Display -->
        <div id="performance-display" class="performance-display" style="display: none;"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Saharat Paovarangkul</p>
    </footer>
  </div>

  <script src="performance-monitor.js"></script>
  <script src="app.js"></script>
  <script>
    // Initialize the application when DOM is loaded
    document.addEventListener('DOMContentLoaded', init);
    
    // Auto-test Thai Mobile patterns
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        console.log('Auto-testing Thai Mobile patterns...');
        
        // Test 06 pattern
        const patternSelect = document.getElementById('pattern-select');
        const addButton = document.getElementById('add-pattern-btn');
        
        patternSelect.value = '06????????';
        addButton.click();
        
        console.log('Added 06 pattern, check results display');
      }, 1000);
    });
  </script>
</body>
</html>
